# =============================
# TrendRadar 配置 - OTA酒店行业热点监控
# Version: 6.5.0
# =============================

app:
  timezone: "Asia/Shanghai"
  show_version_update: false

# === 热榜平台（精简为3个新闻平台，去除娱乐/财经噪音源） ===
platforms:
  enabled: true
  sources:
    - id: "baidu"
      name: "百度热搜"
    - id: "toutiao"
      name: "今日头条"
    - id: "thepaper"
      name: "澎湃新闻"

# === 报告模式 ===
report:
  mode: "incremental"
  display_mode: "keyword"
  rank_threshold: 50
  max_news_per_keyword: 10

# === 通知 ===
# webhook_url 通过 GitHub Secrets 环境变量注入，不写入代码仓库
notification:
  enabled: true
  channels:
    wework:
      msg_type: "markdown"

# === RSS 信息源（已禁用，36kr为泛科技新闻，与酒店行业无关） ===
rss:
  enabled: false

# === 显示区域 ===
display:
  region_order: ["hotlist", "new_items"]
  regions:
    hotlist: true
    new_items: true
    rss: false
    standalone: false
    ai_analysis: false

# === 存储 ===
storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 7

# === 高级设置 ===
advanced:
  debug: false
  crawler:
    request_interval: 200
    use_proxy: false
